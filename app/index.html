<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>勉強ツール</title>
    <link rel="stylesheet" href="./src/styles/page.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Static Math Tool</p>
          <h1 id="app-title">勉強ツール</h1>
          <p id="app-source" class="meta-line"></p>
        </div>
        <div class="toolbar">
          <label class="toolbar-field toolbar-field-wide">
            <span>問題セット</span>
            <select id="dataset-select"></select>
          </label>
          <label class="toolbar-field">
            <span>ページ</span>
            <select id="page-filter"></select>
          </label>
          <button id="clear-visible" type="button">表示中をクリア</button>
          <button id="undo-clear" type="button">ひとつもどる</button>
          <button id="redo-clear" type="button">ひとつすすむ</button>
          <button id="toggle-answers" type="button">答えを表示</button>
          <button id="toggle-explanations" type="button">解説を表示</button>
          <button id="toggle-transfer-mode" type="button">転記モード</button>
          <button id="toggle-transfer-content" type="button">転記内容: 入力内容</button>
          <button id="print-transfer" type="button">転記を印刷</button>
          <button id="export-storage" type="button">記憶を書き出す</button>
          <button id="import-storage" type="button">記憶を読み込む</button>
          <input id="import-storage-file" type="file" accept="application/json,.json" hidden />
        </div>
      </header>

      <p id="storage-transfer-status" class="toolbar-status" aria-live="polite"></p>

      <main>
        <section class="page-progress-panel" aria-live="polite">
          <div id="page-progress" class="page-progress-list"></div>
        </section>
        <section id="problem-list" class="problem-list" aria-live="polite"></section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
